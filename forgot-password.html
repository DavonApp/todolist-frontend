<!DOCTYPE html>
<html>
    <head>
        <!-- Shared stylesheet-->
        <link rel="stylesheet" href="styles.css">

        <!-- Page title shown in browser tab -->
        <title>Forgot Password</title>
    </head>

    <!-- Page-specific class for layout and styling -->
    <body class="forgot-password-page">

        <!-- Container for centering and grouping all content -->
        <div class="forgot-password-content">

            <!-- Back navigation to signup page -->
            <a href="signup.html" class="back-button">&#8592;</a>
            
            <!-- Page heading -->
            <h2>Reset your password</h2>

            <!-- Instructional text to guide user -->
            <p>Enter your account email to receive a password reset link</p>

            <!-- Form for collecting user email -->
            <form class="forgot-password-form" id="forgot-password-form">

                <!-- Input group -->
                <div class="forgot-password-form-group">

                    <!-- Label improves accessibility and usability -->
                    <label for="email-address">Email address</label>

                    <!-- Email input field -->
                    <input type="email" id="email-address" placeholder="Enter your email address...">
                </div>
            </form>

            <!-- Submit button placed outside form -->
            <!-- Uses 'form' attribute to connect to form -->
            <button class="reset-password-button" type="submit" form="forgot-password-form">
                Reset Password
            </button>

            <!-- Navigation for users without an account -->
            <p>
                Don't have an account?
                <a class="signup-links" href="signup.html">Sign up</a>
            </p>
            
            <!-- Navigation for existing users -->
            <p>
                Already have an account?
                <a class="signup-links" href="login.html">Login</a>
            </p>

            <!-- Return to landing page -->
            <p>
                <a class="signup-links" href="index.html">Go Home</a>
            </p>
        </div>
    </body>
</html>

<script>
document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email-address').value;

    const res = await fetch('http://localhost:8080/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
    });

    if (res.ok) {
        window.location.href = 'check-email.html';
    }
});
</script>
