<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
    <title>Reset Password</title>
</head>
<body class="forgot-password-page">
    <div class="forgot-password-content">
        <h2>Set a new password</h2>
        <p>Enter your new password below.</p>

        <form class="forgot-password-form" id="reset-form">
            <div class="forgot-password-form-group">
                <label for="new-password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" 
                           placeholder="Enter new password..." required>
                    <button type="button" class="toggle-password" 
                            onclick="togglePasswordVisibility('new-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="forgot-password-form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" 
                           placeholder="Confirm new password..." required>
                    <button type="button" class="toggle-password" 
                            onclick="togglePasswordVisibility('confirm-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
        </form>

        <button class="reset-password-button" type="submit" form="reset-form">
            Update Password
        </button>
    </div>

    <script>
        // Grab token from URL
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) window.location.href = 'login.html';

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirm     = document.getElementById('confirm-password').value;

            if (newPassword !== confirm) {
                alert("Passwords don't match");
                return;
            }

            const res = await fetch('http://localhost:8080/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });

            if (res.ok) {
                alert("Password updated! Please log in.");
                window.location.href = 'login.html';
            } else {
                const err = await res.text();
                alert(err);
            }
        });

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
